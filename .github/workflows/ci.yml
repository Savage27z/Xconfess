name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  RUST_BACKTRACE: 1
  CI: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect scoped changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'xconfess-backend/**'
              - '!xconfess-backend/**/*.md'
              - 'package.json'
              - 'package-lock.json'
              - '.gitattributes'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
              - 'scripts/**'
            frontend:
              - 'xconfess-frontend/**'
              - '!xconfess-frontend/**/*.md'
              - 'package.json'
              - 'package-lock.json'
              - '.gitattributes'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
              - 'scripts/**'
            contracts:
              - 'xconfess-contracts/**'
              - '!xconfess-contracts/**/*.md'
              - 'package.json'
              - 'package-lock.json'
              - '.gitattributes'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
              - 'scripts/**'

  no-relevant-changes:
    name: No scoped changes
    needs: changes
    if: needs.changes.outputs.backend != 'true' && needs.changes.outputs.frontend != 'true' && needs.changes.outputs.contracts != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip unrelated changes
        run: echo "No backend, frontend, or contracts code/config changes detected. Scoped CI jobs were skipped."

  backend-build-lint:
    name: Backend build + lint
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run backend:build

      - name: Lint backend
        run: npm run backend:lint

  backend-tests:
    name: Backend tests (advisory)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run backend:test

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: xconfess-backend/coverage
          if-no-files-found: ignore
          retention-days: 7

  frontend-build-lint:
    name: Frontend build + lint
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BACKEND_API_URL: http://127.0.0.1:5000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:5000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_DEV_BYPASS_AUTH: 'true'
      NEXT_PUBLIC_ENABLE_DEV_MOCK_ADMIN_LOGIN: 'true'
      NEXT_PUBLIC_STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run frontend:lint

      - name: Build frontend
        run: npm run frontend:build

  frontend-tests:
    name: Frontend tests (advisory)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      BACKEND_API_URL: http://127.0.0.1:5000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:5000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_DEV_BYPASS_AUTH: 'true'
      NEXT_PUBLIC_ENABLE_DEV_MOCK_ADMIN_LOGIN: 'true'
      NEXT_PUBLIC_STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run frontend:test

  contracts-build:
    name: Contracts build
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: xconfess-contracts
          cache-targets: true

      - name: Build release contracts
        run: npm run contract:build:release

  contracts-quality:
    name: Contracts checks (advisory)
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: xconfess-contracts
          cache-targets: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run contract CI
        run: npm run ci:contract
