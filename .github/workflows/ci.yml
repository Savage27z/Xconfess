name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint backend
        run: npm run lint --workspace=xconfess-backend
      - name: Lint frontend
        run: npm run lint --workspace=xconfess-frontend

  contract-gas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - name: Install toolchain dependencies
        run: sudo apt-get update && sudo apt-get install -y bc jq
      - name: Run Gas Regression Checks
        run: ./scripts/contracts-gas-checks.sh
